<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cockpit CI Overview</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script>
      const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dim' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        document.documentElement.setAttribute('data-theme', e.matches ? 'dim' : 'light');
      });
    </script>

    <script type="importmap">
      {
        "imports": {
          "lit-html": "https://esm.sh/lit-html@3",
          "lit-html/": "https://esm.sh/lit-html@3/"
        }
      }
    </script>
    <script type="module" src="/ci.js"></script>
  </head>

  <body class="min-h-screen bg-base-200 p-4">
    <div id="app"></div>
  </body>
</html>
